text_sensor:
  - platform: template
    id: "last_read_code"
    name: "Last received code"
    lambda: |-
      esphome::mower::Automower *mower = (esphome::mower::Automower *) id(mower_id);
      return {mower->get_last_code_received_text_sensor()->state};

  - platform: template
    id: "current_mode"
    name: "Current Mode"
    lambda: |-
      esphome::mower::Automower *mower = (esphome::mower::Automower *) id(mower_id);
      return {mower->get_mode_text_sensor()->state};

  - platform: template
    id: "status_sensor"
    name: "Status"
    lambda: |-
      esphome::mower::Automower *mower = (esphome::mower::Automower *) id(mower_id);
      return {mower->get_status_text_sensor()->state};

  - platform: template
    id: "device_gm_url"
    name: "Google Maps URL"
    lambda: |-
      char str[1024];
      if ((id(gps_latitude).state != -1) && (id(gps_longitude).state != -1)) {
        sprintf(str,"https://www.google.com/maps/place/Current+Location/@%f,%f,18z/data=!3m1!4b1!4m5!3m4!1s0x6b126c2178de0f87:0x5b42610cb9db9393!8m2!3d%f!4d%f",id(gps_latitude).state,id(gps_longitude).state,id(gps_latitude).state,id(gps_longitude).state);
      } else {
        sprintf(str,"https://www.google.com/maps/@50,-30,7.81z");
      }
      return (std::string) str;

  - platform: template
    id: "device_osm_url"
    name: "OpenStreetMap URL"
    lambda: |-
      const std::string osmBboxVar = "${osm_bbox}";
      char str[1024];
      if ((id(gps_latitude).state != -1) && (id(gps_longitude).state != -1)) {
        sprintf(str,"https://www.openstreetmap.org/export/embed.html?bbox=%s&layer=mapnik&marker=%f%2C%f",osmBboxVar.c_str(),id(gps_latitude).state,id(gps_longitude).state);
      } else {
        sprintf(str,"https://www.openstreetmap.org/export/embed.html?bbox=%s&layer=mapnik",osmBboxVar.c_str());
      }
      return (std::string) str;
