text_sensor:
  - platform: template
    id: "last_read_code"
    name: "Last received code"
    icon: "mdi:hexadecimal"
    lambda: |-
      esphome::mower::Automower *mower = (esphome::mower::Automower *) id(mower_id);
      return {mower->get_last_code_received_text_sensor()->state};

  - platform: template
    id: "current_mode"
    name: "Current Mode"
    icon: "mdi:state-machine"
    lambda: |-
      esphome::mower::Automower *mower = (esphome::mower::Automower *) id(mower_id);
      return {mower->get_mode_text_sensor()->state};

  - platform: template
    id: "status_sensor"
    name: "Status"
    icon: "mdi:robot-mower"
    lambda: |-
      esphome::mower::Automower *mower = (esphome::mower::Automower *) id(mower_id);
      return {mower->get_status_text_sensor()->state};

  - platform: template
    id: "status_message_sensor"
    name: "Status Message"
    lambda: |-
      esphome::mower::Automower *mower = (esphome::mower::Automower *) id(mower_id);
      return {mower->get_status_message_text_sensor()->state};
