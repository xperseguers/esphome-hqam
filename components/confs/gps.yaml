gps:
  uart_id: uart_gps
  update_interval: 5s

  latitude:
    name: "GPS Latitude"
    id: gps_latitude
    force_update: true

  longitude:
    name: "GPS Longitude"
    id: gps_longitude
    force_update: true

  altitude:
    name: "GPS Altitude"
    id: gps_altitude
    force_update: true

  speed:
    name: "GPS Speed"
    id: gps_speed
    force_update: true
    filters:
    # - heartbeat: 500ms
    # - throttle: 100ms
    - debounce: 500ms

  satellites:
    name: "GPS Satellites"
    id: gps_satellites
    force_update: true
    filters:
    - throttle: 500ms

  course:
    name: "GPS Course"
    id: gps_course
    force_update: true
    filters:
    - throttle: 50ms

  hdop:
    name: "GPS HDOP"
    id: gps_hdop
